<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attestation de Conversion</title>
    <style>
        /* Styles de base pour l'écran */
        body { 
            font-family: 'Arial', sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #525659; /* Couleur de fond style visionneuse PDF */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bold { font-weight: bold; }

        /* Formulaire */
        .form-container {
            width: 210mm; /* Largeur A4 pour correspondre au doc */
            background: white; 
            padding: 20px;
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; box-sizing: border-box; 
            border: 1px solid #ccc; border-radius: 4px;
        }
        .btn { 
            background: #28a745; color: white; border: none; 
            padding: 15px; cursor: pointer; border-radius: 4px; 
            font-size: 16px; width: 100%; font-weight: bold;
        }

        /* Conteneur du Certificat - FORMAT A4 EXACT */
        .page-a4 {
            width: 210mm;
            height: 297mm;
            background: white;
            padding: 20mm; /* Marges du document */
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            box-sizing: border-box;
            position: relative;
        }
        
        /* En-tête (Header) */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 30px; 
        }
        .header-left { 
            text-align: left; 
            font-size: 14px; 
            line-height: 1.5; 
            width: 30%;
        }
        .header-center { 
            text-align: center; 
            width: 40%;
        }
        .header-right {
            text-align: right;
            width: 30%;
        }
        
        /* LOGO */
        .logo {
            max-width: 120px;
            max-height: 120px;
            object-fit: contain;
        }

        .title-ar { font-size: 26px; font-weight: bold; margin: 0; font-family: 'Times New Roman', serif; }
        .title-fr { font-size: 16px; font-weight: bold; margin: 5px 0; }
        .subtitle { font-size: 14px; margin: 0; font-style: italic; }

        .bismillah { 
            text-align: center; font-size: 20px; margin-bottom: 30px; 
            font-family: 'Times New Roman', serif; direction: rtl;
        }
        
        /* Contenu du texte */
        .text-ar { 
            direction: rtl; text-align: justify; font-size: 20px; 
            font-family: 'Times New Roman', serif; line-height: 1.8; margin-bottom: 40px; 
        }
        .text-fr { 
            text-align: justify; font-size: 15px; 
            line-height: 1.6; margin-bottom: 20px; 
        }
        
        /* Signatures */
        .signatures { display: flex; justify-content: space-around; margin-top: 60px; }
        .signature-box { text-align: center; }
        .sig-ar { font-weight: bold; font-family: 'Times New Roman', serif; font-size: 20px; margin-bottom: 5px;}
        .sig-fr { font-weight: bold; font-size: 15px;}
        
        /* Pied de page */
        .footer { 
            position: absolute;
            bottom: 20mm;
            left: 20mm;
            right: 20mm;
            text-align: center; font-size: 11px; 
            border-top: 1px solid #000; padding-top: 10px;
        }

        /* Mode Impression (Génération PDF) */
        @media print {
            body { background: white; padding: 0; margin: 0; display: block; }
            .form-container { display: none !important; }
            .page-a4 { 
                box-shadow: none; padding: 20mm; width: 100%; height: 100%; margin: 0; page-break-after: avoid;
            }
            @page { size: A4; margin: 0; } /* Supprime les marges par défaut du navigateur */
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Données de l'Attestation</h2>
        <div class="form-group">
            <label>Prénom NOM (en français) :</label>
            <input type="text" id="fullname_fr" placeholder="Ex: Kevin RODRIGUES" oninput="updateArabicName(); updateCertificate();">
        </div>
        <div class="form-group">
            <label>Prénom NOM (en arabe) - <i>Généré auto si vide</i> :</label>
            <input type="text" id="fullname_ar" dir="rtl" placeholder="Ex: كيفين رودريغيس" oninput="updateCertificate()">
        </div>
        <div class="form-group">
            <label>Genre :</label>
            <select id="gender" onchange="updateCertificate()">
                <option value="m">Masculin (Frère)</option>
                <option value="f">Féminin (Sœur)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Date de naissance :</label>
            <input type="date" id="dob" onchange="updateCertificate()">
        </div>
        <div class="form-group">
            <label>Date de reconversion :</label>
            <input type="date" id="doc" onchange="updateCertificate()">
        </div>
        <button class="btn" onclick="window.print()">🖨️ Générer le PDF (Imprimer)</button>
    </div>

    <div class="page-a4">

                <span class="bold">Mosquée Al Houda</span><br>
                9 Rue Edith Piaf<br>
                Clermont-Ferrand 63100<br>
                France
            </div>

                <p class="title-fr">ATTESTATION DE CONVERSION A L'ISLAM</p>
                <p class="subtitle">Masjid Al Houda<br>De Clermont-Ferrand</p>
